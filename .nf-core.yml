repository_type: pipeline

nf_core_version: 4.0.2

lint:
  files_unchanged:
    - .gitignore
    - assets/sendmail_template.txt
    - CODE_OF_CONDUCT.md
    - assets/nf-core-domainsplit_logo_light.png
    - docs/images/nf-core-domainsplit_logo_light.png
    - docs/images/nf-core-domainsplit_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config: false
  files_exist:
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - assets/multiqc_config.yml
    - CODE_OF_CONDUCT.md
    - assets/nf-core-domainsplit_logo_light.png
    - docs/images/nf-core-domainsplit_logo_light.png
    - docs/images/nf-core-domainsplit_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml

template:
  org: daisybio
  name: domainsplit
  description: A nextflow pipeline to split domain-domain interaction data into train,
    validation, and test while reducing data leakage and bias.
  author: Konstantin Pelz, Christian Romberg, Chiara Thomas
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - igenomes
    - multiqc
    - fastqc
    - vscode
  is_nfcore: false
